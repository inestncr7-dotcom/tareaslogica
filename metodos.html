<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Métodos Numéricos</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
        }
        
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5f5f7;
        }
        
        .card {
            background: white;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .1);
            width: 400px;
            text-align: center;
        }
        
        h1 {
            margin-bottom: 20px;
            color: #1d1d1f;
        }
        
        input {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #f0f0f0;
            font-size: 18px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: #0071e3;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: .3s;
        }
        
        button:hover {
            background: #0062c4;
        }
        
        #resultado {
            margin-top: 25px;
            font-size: 22px;
            color: #1d1d1f;
            font-weight: 500;
        }
    </style>
</head>

<body>

    <div class="card">

        <h1>Analizador de Números</h1>

        <input type="number" id="numero" placeholder="Ingresa un número">

        <button id="btnAnalizar">
            Analizar Número
        </button>

        <p id="resultado"></p>

    </div>

    <script src="index.js"></script>

</body>

</html>
